<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FakeGram - Конструктор диалогов</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
    <meta name="theme-color" content="#2b5278">
</head>
<body>
<div class="app">
    <!-- Боковая панель с чатами -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="user-info">
                <div class="avatar" id="currentUserAvatar">👤</div>
                <span class="username" id="username">Пользователь</span>
            </div>
            <button class="menu-btn" id="menuBtn">☰</button>
        </div>

        <!-- Меню пользователя -->
        <div class="user-menu" id="userMenu" style="display: none;">
            <div class="menu-section">
                <div class="menu-item" id="profileMenuItem">
                    <span class="menu-icon">👤</span>
                    <span>Профиль</span>
                </div>
                <div class="menu-item" id="settingsMenuItem">
                    <span class="menu-icon">⚙️</span>
                    <span>Настройки</span>
                </div>
            </div>
            <div class="menu-section">
                <div class="menu-item" id="newChatMenuItem">
                    <span class="menu-icon">➕</span>
                    <span>Новый диалог</span>
                </div>
                <div class="menu-item" id="editChatMenuItem">
                    <span class="menu-icon">✏️</span>
                    <span>Редактировать диалог</span>
                </div>
                <div class="menu-item" id="deleteChatMenuItem">
                    <span class="menu-icon">🗑️</span>
                    <span>Удалить диалог</span>
                </div>
            </div>
            <div class="menu-section">
                <div class="menu-item" id="exportMenuItem">
                    <span class="menu-icon">📤</span>
                    <span>Экспорт диалогов</span>
                </div>
                <div class="menu-item" id="importMenuItem">
                    <span class="menu-icon">📥</span>
                    <span>Импорт диалогов</span>
                </div>
                <input type="file" id="importFile" accept=".json" style="display: none">
            </div>
        </div>

        <div class="chats-list" id="chatsList">
            <!-- Чаты будут добавляться сюда -->
        </div>
    </aside>

    <!-- Основная область чата -->
    <main class="chat-area">
        <div class="chat-header" id="chatHeader">
            <div class="chat-info">
                <div class="avatar" id="currentChatAvatar">👥</div>
                <div>
                    <div class="chat-name" id="currentChatName">Общий чат</div>
                    <div class="chat-status" id="chatStatus">онлайн</div>
                </div>
            </div>
        </div>

        <div class="messages-container" id="messagesContainer">
            <!-- Сообщения будут здесь -->
        </div>

        <div class="typing-indicator" id="typingIndicator" style="display: none;">
            <span>собеседник печатает</span>
            <span class="typing-dots">...</span>
        </div>

        <div class="message-input-container">
            <button class="attach-btn" id="attachBtn">📎</button>
            <input type="text" class="message-input" id="messageInput" placeholder="Сообщение">
            <button class="send-btn" id="sendButton">📤</button>
        </div>
    </main>
</div>

<!-- Модальное окно профиля -->
<div class="modal" id="profileModal" style="display: none;">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Профиль</h3>
            <button class="close-btn" onclick="closeModal('profileModal')">✖</button>
        </div>
        <div class="modal-body">
            <div class="avatar-section">
                <div class="current-avatar" id="profileAvatarPreview">👤</div>
                <div class="avatar-upload">
                    <button class="btn-secondary" id="uploadAvatarBtn">Загрузить фото</button>
                    <input type="file" id="avatarUpload" accept="image/*" style="display: none">
                    <button class="btn-secondary" id="avatarUrlBtn">По ссылке</button>
                </div>
                <div class="avatar-url-input" id="avatarUrlInput" style="display: none;">
                    <input type="text" id="avatarUrl" placeholder="https://example.com/avatar.jpg">
                    <button class="btn-primary" id="applyAvatarUrl">Применить</button>
                </div>
            </div>
            <div class="form-group">
                <label>Имя пользователя</label>
                <input type="text" id="usernameInput" value="Пользователь">
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn-primary" onclick="saveProfile()">Сохранить</button>
            <button class="btn-secondary" onclick="closeModal('profileModal')">Отмена</button>
        </div>
    </div>
</div>

<!-- Модальное окно диалога -->
<div class="modal" id="chatModal" style="display: none;">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="chatModalTitle">Новый диалог</h3>
            <button class="close-btn" onclick="closeModal('chatModal')">✖</button>
        </div>
        <div class="modal-body">
            <div class="avatar-section">
                <div class="current-avatar" id="chatAvatarPreview">👥</div>
                <div class="avatar-upload">
                    <button class="btn-secondary" id="uploadChatAvatarBtn">Загрузить фото</button>
                    <input type="file" id="chatAvatarUpload" accept="image/*" style="display: none">
                    <button class="btn-secondary" id="chatAvatarUrlBtn">По ссылке</button>
                </div>
                <div class="avatar-url-input" id="chatAvatarUrlInput" style="display: none;">
                    <input type="text" id="chatAvatarUrl" placeholder="https://example.com/avatar.jpg">
                    <button class="btn-primary" id="applyChatAvatarUrl">Применить</button>
                </div>
            </div>
            <div class="form-group">
                <label>Название чата</label>
                <input type="text" id="chatNameInput" placeholder="Например: Алексей">
            </div>
            <div class="form-group">
                <label>Статус по умолчанию</label>
                <input type="text" id="chatStatusInput" placeholder="онлайн">
            </div>

            <!-- Секция планирования событий -->
            <div class="events-section">
                <div class="events-header">
                    <label>Запланированные события</label>
                    <button class="btn-add-event" id="addEventBtn">+ Добавить событие</button>
                </div>
                <div class="events-list" id="eventsList">
                    <!-- События будут отображаться здесь -->
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn-primary" id="saveChatBtn">Сохранить</button>
            <button class="btn-secondary" onclick="closeModal('chatModal')">Отмена</button>
        </div>
    </div>
</div>

<!-- Модальное окно события -->
<div class="modal" id="eventModal" style="display: none;">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="eventModalTitle">Новое событие</h3>
            <button class="close-btn" onclick="closeModal('eventModal')">✖</button>
        </div>
        <div class="modal-body">
            <form id="eventForm">
                <input type="hidden" id="eventId">

                <div class="form-group">
                    <label>Триггер события</label>
                    <select id="eventTrigger" class="form-select">
                        <option value="time">В определенное время</option>
                        <option value="after_message">После моего сообщения</option>
                    </select>
                </div>

                <div class="form-group" id="eventTimeGroup" style="display: none;">
                    <label>Время (HH:MM)</label>
                    <input type="time" id="eventTime">
                </div>

                <div class="form-group" id="eventDelayGroup" style="display: none;">
                    <label>Задержка перед ответом (секунд)</label>
                    <input type="number" id="eventDelay" value="10" min="1">
                </div>

                <div class="form-group">
                    <label>Время печатания (секунд)</label>
                    <input type="number" id="eventTypingTime" value="5" min="1" max="30">
                </div>

                <div class="form-group">
                    <label>Текст сообщения</label>
                    <textarea id="eventMessage" rows="3" placeholder="Введите текст сообщения..."></textarea>
                </div>

                <div class="form-group">
                    <label>Новый статус (оставьте пустым, если не менять)</label>
                    <input type="text" id="eventStatus" placeholder="например: онлайн, был(а) 5 мин назад">
                </div>
            </form>
        </div>
        <div class="modal-footer">
            <button class="btn-primary" id="saveEventBtn">Сохранить</button>
            <button class="btn-secondary" onclick="closeModal('eventModal')">Отмена</button>
        </div>
    </div>
</div>

<!-- Модальное окно сообщений (оставляем для совместимости) -->
<div class="modal" id="messageModal" style="display: none;">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Редактирование сообщений</h3>
            <button class="close-btn" onclick="closeModal('messageModal')">✖</button>
        </div>
        <div class="modal-body">
            <div class="messages-list" id="editableMessages">
                <!-- Сообщения для редактирования -->
            </div>
            <button class="btn-add-message" id="addMessageBtn">+ Добавить сообщение</button>
        </div>
        <div class="modal-footer">
            <button class="btn-primary" onclick="saveMessages()">Сохранить</button>
            <button class="btn-secondary" onclick="closeModal('messageModal')">Отмена</button>
        </div>
    </div>
</div>

<!-- Mobile Navigation -->
<div class="mobile-nav" id="mobileNav">
    <div class="mobile-nav-items">
        <button class="mobile-nav-item active" data-view="chats">
            <span class="mobile-nav-icon">💬</span>
            <span>Чаты</span>
        </button>
        <button class="mobile-nav-item" data-view="contacts">
            <span class="mobile-nav-icon">👥</span>
            <span>Контакты</span>
        </button>
        <button class="mobile-nav-item" id="mobileProfileBtn">
            <span class="mobile-nav-icon">👤</span>
            <span>Профиль</span>
        </button>
        <button class="mobile-nav-item" id="mobileSettingsBtn">
            <span class="mobile-nav-icon">⚙️</span>
            <span>Настройки</span>
        </button>
    </div>
</div>

<!-- Mobile back button (will be inserted dynamically) -->

<script src="app.js"></script>
</body>
</html>
